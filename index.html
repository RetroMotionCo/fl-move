// Auto-compute effective milestone status:
// If manually marked done → done. If past date and not done → overdue. Otherwise use stored status.
function effectiveMilestoneStatus(m) {
  if (m.status === "done") return "done";
  if (m.date < new Date().toISOString().split("T")[0] && m.status !== "done") return "overdue";
  return m.status || "on-track";
}

// ─── UTILITIES ────────────────────────────────────────────────────────────────

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function todayISO() {
  return new Date().toISOString().split("T")[0];
}

function tomorrowISO() {
  const d = new Date();
  d.setDate(d.getDate() + 1);
  return d.toISOString().split("T")[0];
}

function formatDate(iso) {
  if (!iso) return "";
  const [y, m, d] = iso.split("-");
  return `${m}/${d}/${y}`;
}

function isOverdue(dueDate) {
  if (!dueDate) return false;
  return dueDate < todayISO();
}

function isDueThisWeek(dueDate) {
  if (!dueDate) return false;
  const today = new Date();
  const due = new Date(dueDate);
  const diff = (due - today) / (1000 * 60 * 60 * 24);
  return diff >= 0 && diff <= 7;
}

// ─── ROLLOVER LOGIC ────────────────────────────────────────────────────────────
// Called on app load and conceptually at midnight.
// For each incomplete task with a past dueDate and autoRollover=true:
//   - Save originalDueDate if not yet set
//   - Increment rolloverCount
//   - Add entry to rolloverHistory
//   - Set dueDate to today
//   - If rolloverCount >= 3: task gets a warning badge

function runRolloverCheck(tasks) {
  const today = todayISO();
  return tasks.map(task => {
    if (
      task.status !== "Done" &&
      task.dueDate &&
      task.dueDate < today &&
      task.autoRollover
    ) {
      const fromDate = task.dueDate;
      const newTask = {
        ...task,
        originalDueDate: task.originalDueDate || fromDate,
        rolloverCount: (task.rolloverCount || 0) + 1,
        rolloverHistory: [
          ...(task.rolloverHistory || []),
          { date: today, fromDate, toDate: today }
        ],
        dueDate: today,
        updatedAt: new Date().toISOString()
      };
      return newTask;
    }
    return task;
  });
}

// ─── PATHWAY PRIORITY LOGIC ───────────────────────────────────────────────────
// When the active pathway changes:
//   1. Tasks with pathwaySortOrder[pathwayId] use that value for sorting.
//   2. Tasks whose pathways[] includes the active pathway get boosted (tier 0).
//   3. Tasks NOT in the active pathway's list get deprioritized (tier 1, lower opacity).
//   4. manuallyOrdered tasks keep position unless "Reset to Recommended Order" is clicked.
//   5. "Reset to Recommended Order" clears manuallyOrdered flags and re-applies pathway sort.

function sortTasksForPathway(tasks, pathwayId) {
  const PRIORITY_WEIGHT = { Critical: 0, High: 1, Medium: 2, Low: 3 };
  return [...tasks].sort((a, b) => {
    if (a.manuallyOrdered && b.manuallyOrdered) {
      const aOrder = a.pathwaySortOrder?.[pathwayId] ?? a.sortOrder;
      const bOrder = b.pathwaySortOrder?.[pathwayId] ?? b.sortOrder;
      return aOrder - bOrder;
    }
    const aInPathway = a.pathways.includes(pathwayId);
    const bInPathway = b.pathways.includes(pathwayId);
    if (aInPathway && !bInPathway) return -1;
    if (!aInPathway && bInPathway) return 1;
    const aPriority = PRIORITY_WEIGHT[a.priority] ?? 4;
    const bPriority = PRIORITY_WEIGHT[b.priority] ?? 4;
    if (aPriority !== bPriority) return aPriority - bPriority;
    const aOrder = a.pathwaySortOrder?.[pathwayId] ?? a.sortOrder;
    const bOrder = b.pathwaySortOrder?.[pathwayId] ?? b.sortOrder;
    return aOrder - bOrder;
  });
}

// ─── READINESS SCORE ──────────────────────────────────────────────────────────

function calcReadinessScore(tasks) {
  const done = (cats) => tasks.filter(t => cats.includes(t.category) && t.status === "Done").length;
  const total = (cats) => Math.max(1, tasks.filter(t => cats.includes(t.category)).length);

  const annaScore = (done(["Anna Career"]) / total(["Anna Career"])) * 15;
  const justinScore = (done(["Justin Career"]) / total(["Justin Career"])) * 10;
  const bizScore = (done(["RetroMotion", "Venetian Soda Lounge", "Venetian Beverages"]) / total(["RetroMotion", "Venetian Soda Lounge", "Venetian Beverages"])) * 20;
  const legalScore = (done(["Legal / Debt / CPA"]) / total(["Legal / Debt / CPA"])) * 15;
  const vtScore = (done(["Vermont Home"]) / total(["Vermont Home"])) * 10;
  const flScore = (done(["Florida Housing"]) / total(["Florida Housing"])) * 10;
  const kidsScore = (done(["Kids / Schools"]) / total(["Kids / Schools"])) * 5;
  const cashScore = (done(["Budget / Cash Flow"]) / total(["Budget / Cash Flow"])) * 10;
  const sevenDaysAgo = new Date(); sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
  const recentDone = tasks.filter(t => t.completionDate && new Date(t.completionDate) >= sevenDaysAgo).length;
  const momentumScore = Math.min(5, (recentDone / Math.max(1, tasks.length)) * 100);

  const total_score = Math.round(annaScore + justinScore + bizScore + legalScore + vtScore + flScore + kidsScore + cashScore + momentumScore);
  return Math.min(100, Math.max(0, total_score));
}

function scoreColor(score) {
  if (score >= 80) return "text-green-400";
  if (score >= 60) return "text-yellow-400";
  if (score >= 40) return "text-orange-400";
  return "text-red-400";
}

function scoreBarColor(score) {
  if (score >= 80) return "bg-green-500";
  if (score >= 60) return "bg-yellow-500";
  if (score >= 40) return "bg-orange-500";
  return "bg-red-500";
}

// ─── SUBTASK EDITOR ───────────────────────────────────────────────────────────

function SubtaskEditor({ subtasks, onChange }) {
  const [newTitle, setNewTitle] = useState("");
  function add() {
    if (!newTitle.trim()) return;
    onChange([...subtasks, { id: genId(), title: newTitle.trim(), done: false }]);
    setNewTitle("");
  }
  function toggle(id) {
    onChange(subtasks.map(s => s.id === id ? { ...s, done: !s.done } : s));
  }
  function remove(id) {
    onChange(subtasks.filter(s => s.id !== id));
  }
  return (
    <div>
      {subtasks.map(s => (
        <div key={s.id} className="flex items-center gap-2 py-1">
          <input type="checkbox" checked={s.done} onChange={() => toggle(s.id)} className="rounded" />
          <span className={`flex-1 text-sm ${s.done ? "line-through text-slate-500" : "text-slate-200"}`}>{s.title}</span>
          <button onClick={() => remove(s.id)} className="text-red-400 hover:text-red-300 text-xs">✕</button>
        </div>
      ))}
      <div className="flex gap-2 mt-2">
        <input
          value={newTitle}
          onChange={e => setNewTitle(e.target.value)}
          onKeyDown={e => e.key === "Enter" && add()}
          placeholder="Add subtask..."
          className="flex-1 bg-slate-700 border border-slate-600 text-slate-200 text-sm rounded px-2 py-1"
        />
        <button onClick={add} className="bg-teal-600 hover:bg-teal-500 text-white text-sm px-3 py-1 rounded">Add</button>
      </div>
    </div>
  );
}

// ─── BULK ACTION BAR ──────────────────────────────────────────────────────────

function BulkActionBar({ selectedIds, tasks, onUpdate, onClear }) {
  const [bulkStatus, setBulkStatus] = useState("");
  const [bulkPriority, setBulkPriority] = useState("");
  const [bulkOwner, setBulkOwner] = useState("");

  function apply() {
    const updates = {};
    if (bulkStatus) updates.status = bulkStatus;
    if (bulkPriority) updates.priority = bulkPriority;
    if (bulkOwner) updates.owner = bulkOwner;
    if (Object.keys(updates).length) {
      onUpdate(selectedIds, updates);
      onClear();
    }
  }

  return (
    <div className="flex items-center gap-2 flex-wrap bg-slate-700 rounded-lg px-3 py-2 text-xs">
      <span className="text-slate-300 font-semibold">{selectedIds.length} selected</span>
      <select value={bulkStatus} onChange={e => setBulkStatus(e.target.value)} className="bg-slate-600 text-white rounded px-2 py-1">
        <option value="">Set Status...</option>
        {STATUSES.map(s => <option key={s}>{s}</option>)}
      </select>
      <select value={bulkPriority} onChange={e => setBulkPriority(e.target.value)} className="bg-slate-600 text-white rounded px-2 py-1">
        <option value="">Set Priority...</option>
        {PRIORITIES.map(p => <option key={p}>{p}</option>)}
      </select>
      <select value={bulkOwner} onChange={e => setBulkOwner(e.target.value)} className="bg-slate-600 text-white rounded px-2 py-1">
        <option value="">Set Owner...</option>
        {OWNERS.map(o => <option key={o}>{o}</option>)}
      </select>
      <button onClick={apply} className="bg-teal-600 hover:bg-teal-500 text-white px-3 py-1 rounded">Apply</button>
      <button onClick={onClear} className="text-slate-400 hover:text-white underline">Clear Selection</button>
    </div>
  );
}

// ─── TASK SECTION ─────────────────────────────────────────────────────────────

function TaskSection({ frequency, tasks, activePathway, onUpdate, onDelete, onAdd, onBulkUpdate }) {
  const [collapsed, setCollapsed]   = useState(false);
  const [filters, setFilters]       = useState({});
  const [bulkMode, setBulkMode]     = useState(false);
  const [selectedIds, setSelectedIds] = useState([]);
  const [editingTask, setEditingTask] = useState(null);

  // PATHWAY PRIORITY LOGIC: sort + filter tasks for this section
  const sectionTasks = useMemo(() => {
    let t = tasks.filter(task => task.frequency === frequency);
    t = sortTasksForPathway(t, activePathway);
    if (filters.owner)    t = t.filter(task => task.owner === filters.owner);
    if (filters.category) t = t.filter(task => task.category === filters.category);
    if (filters.status)   t = t.filter(task => task.status === filters.status);
    if (filters.priority) t = t.filter(task => task.priority === filters.priority);
    if (filters.search) {
      const s = filters.search.toLowerCase();
      t = t.filter(task => task.title.toLowerCase().includes(s) || task.notes?.toLowerCase().includes(s));
    }
    return t;
  }, [tasks, frequency, activePathway, filters]);

  // Split tasks into columns for side-by-side view
  const justinTasks = sectionTasks.filter(t => t.owner === "Justin");
  const annaTasks   = sectionTasks.filter(t => t.owner === "Anna");
  const bothTasks   = sectionTasks.filter(t => t.owner === "Both");

  const done    = sectionTasks.filter(t => t.status === "Done").length;
  const blocked = sectionTasks.filter(t => t.status === "Blocked").length;

  function handleMoveUp(taskId, list) {
    const idx = list.findIndex(t => t.id === taskId);
    if (idx <= 0) return;
    const above = list[idx - 1], current = list[idx];
    onUpdate([
      { ...current, sortOrder: above.sortOrder - 0.5,  manuallyOrdered: true, pathwaySortOrder: { ...current.pathwaySortOrder, [activePathway]: above.sortOrder - 0.5 } },
      { ...above,   sortOrder: above.sortOrder + 0.5,  manuallyOrdered: true, pathwaySortOrder: { ...above.pathwaySortOrder,   [activePathway]: above.sortOrder + 0.5 } },
    ]);
  }

  function handleMoveDown(taskId, list) {
    const idx = list.findIndex(t => t.id === taskId);
    if (idx >= list.length - 1) return;
    const below = list[idx + 1], current = list[idx];
    onUpdate([
      { ...current, sortOrder: below.sortOrder + 0.5,  manuallyOrdered: true, pathwaySortOrder: { ...current.pathwaySortOrder, [activePathway]: below.sortOrder + 0.5 } },
      { ...below,   sortOrder: below.sortOrder - 0.5,  manuallyOrdered: true, pathwaySortOrder: { ...below.pathwaySortOrder,   [activePathway]: below.sortOrder - 0.5 } },
    ]);
  }

  function handleSetInProgress(task) {
    const newStatus = task.status === "In Progress" ? "Not Started" : "In Progress";
    onUpdate([{ ...task, status: newStatus, updatedAt: new Date().toISOString() }]);
  }

  function handleSetDone(task) {
    const newStatus = task.status === "Done" ? "Not Started" : "Done";
    onUpdate([{
      ...task,
      status: newStatus,
      completionDate: newStatus === "Done" ? new Date().toISOString() : task.completionDate,
      updatedAt: new Date().toISOString()
    }]);
  }

  function handleResetOrder() {
    onUpdate(tasks.filter(t => t.frequency === frequency).map(t => ({ ...t, manuallyOrdered: false, pathwaySortOrder: {} })));
  }

  function toggleSelect(id) {
    setSelectedIds(ids => ids.includes(id) ? ids.filter(i => i !== id) : [...ids, id]);
  }

  const bgColor     = frequency === "Daily" ? "bg-teal-900/30" : frequency === "Weekly" ? "bg-blue-900/30" : "bg-purple-900/30";
  const borderColor = frequency === "Daily" ? "border-teal-700" : frequency === "Weekly" ? "border-blue-700" : "border-purple-700";

  // Shared card renderer so we don't repeat ourselves across columns
  function renderCard(task, list) {
    const idx = list.findIndex(t => t.id === task.id);
    return (
      <TaskCard
        key={task.id}
        task={task}
        activePathway={activePathway}
        selected={selectedIds.includes(task.id)}
        onSelect={() => toggleSelect(task.id)}
        onEdit={() => setEditingTask(task)}
        onSetInProgress={() => handleSetInProgress(task)}
        onSetDone={() => handleSetDone(task)}
        onMoveUp={() => handleMoveUp(task.id, list)}
        onMoveDown={() => handleMoveDown(task.id, list)}
        bulkMode={bulkMode}
        index={idx}
        totalInSection={list.length}
      />
    );
  }

  return (
    <div className={`rounded-xl border ${borderColor} ${bgColor} overflow-hidden mb-4`}>
      {/* Section Header */}
      <div className="flex items-center justify-between px-4 py-3 cursor-pointer" onClick={() => setCollapsed(v => !v)}>
        <div className="flex items-center gap-3">
          <span className="text-xl">{frequency === "Daily" ? "📅" : frequency === "Weekly" ? "📆" : frequency === "Monthly" ? "🗓" : "⭐"}</span>
          <h3 className="text-lg font-bold text-white">{frequency} Tasks</h3>
          <Badge className="bg-slate-700 text-slate-300">{sectionTasks.length}</Badge>
          {done > 0    && <Badge className="bg-emerald-800 text-emerald-200">{done} done</Badge>}
          {blocked > 0 && <Badge className="bg-red-900 text-red-300">{blocked} blocked</Badge>}
        </div>
        <div className="flex items-center gap-2" onClick={e => e.stopPropagation()}>
          <button onClick={handleResetOrder} className="text-xs text-slate-400 hover:text-white px-2 py-1 border border-slate-600 rounded">Reset Order</button>
          <button
            onClick={() => { setBulkMode(v => !v); setSelectedIds([]); }}
            className={`text-xs px-2 py-1 border rounded ${bulkMode ? "bg-teal-700 border-teal-600 text-white" : "text-slate-400 hover:text-white border-slate-600"}`}
          >Bulk Edit</button>
          <button
            onClick={() => setEditingTask(createTask({ frequency, pathways: ["keep-retro-sell-venetian"] }))}
            className="text-xs bg-teal-600 hover:bg-teal-500 text-white px-2 py-1 rounded"
          >+ Add Task</button>
          <span className="text-slate-400 text-lg ml-1">{collapsed ? "▶" : "▼"}</span>
        </div>
      </div>

      {!collapsed && (
        <div className="px-4 pb-4">
          <div className="mb-3"><FilterBar filters={filters} onChange={setFilters} /></div>

          {bulkMode && selectedIds.length > 0 && (
            <div className="mb-3">
              <BulkActionBar
                selectedIds={selectedIds}
                tasks={sectionTasks}
                onUpdate={(ids, updates) => {
                  onBulkUpdate(tasks.filter(t => ids.includes(t.id)).map(t => ({ ...t, ...updates, updatedAt: new Date().toISOString() })));
                }}
                onClear={() => setSelectedIds([])}
              />
            </div>
          )}

          {/* ── LEGEND ── */}
          <div className="flex items-center gap-4 mb-3 text-xs text-slate-400">
            <span className="flex items-center gap-1"><span className="inline-block w-3 h-3 rounded-sm bg-sky-500"></span> In Progress</span>
            <span className="flex items-center gap-1"><span className="inline-block w-3 h-3 rounded-sm bg-emerald-600"></span> Done</span>
            <span className="text-slate-600">Click the small squares on each card to update status</span>
          </div>

          {/* ── SIDE-BY-SIDE COLUMNS ── */}
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
            {/* Justin column */}
            <div>
              <div className="flex items-center gap-2 mb-2 pb-1 border-b border-blue-800">
                <span className="text-sm font-bold text-blue-400">Justin</span>
                <Badge className="bg-blue-900 text-blue-300">{justinTasks.length}</Badge>
              </div>
              <div className="space-y-2">
                {justinTasks.length === 0
                  ? <p className="text-slate-600 text-xs italic py-2 text-center">No Justin tasks</p>
                  : justinTasks.map(t => renderCard(t, justinTasks))}
              </div>
            </div>

            {/* Anna column */}
            <div>
              <div className="flex items-center gap-2 mb-2 pb-1 border-b border-pink-800">
                <span className="text-sm font-bold text-pink-400">Anna</span>
                <Badge className="bg-pink-900 text-pink-300">{annaTasks.length}</Badge>
              </div>
              <div className="space-y-2">
                {annaTasks.length === 0
                  ? <p className="text-slate-600 text-xs italic py-2 text-center">No Anna tasks</p>
                  : annaTasks.map(t => renderCard(t, annaTasks))}
              </div>
            </div>
          </div>

          {/* Both / Shared — full width below */}
          {bothTasks.length > 0 && (
            <div className="mt-4">
              <div className="flex items-center gap-2 mb-2 pb-1 border-b border-purple-800">
                <span className="text-sm font-bold text-purple-400">Shared — Both</span>
                <Badge className="bg-purple-900 text-purple-300">{bothTasks.length}</Badge>
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2">
                {bothTasks.map(t => renderCard(t, bothTasks))}
              </div>
            </div>
          )}

          {sectionTasks.length === 0 && (
            <p className="text-slate-500 text-sm text-center py-4">No tasks match the current filters.</p>
          )}
        </div>
      )}

      {/* Task Editor Modal */}
      {editingTask && (
        <TaskEditorModal
          task={editingTask}
          tasks={tasks}
          onSave={savedTask => {
            if (tasks.find(t => t.id === savedTask.id)) {
              onUpdate([savedTask]);
            } else {
              onUpdate([savedTask], true); // isNew
            }
          }}
          onDelete={onDelete}
          onClose={() => setEditingTask(null)}
        />
      )}
    </div>
  );
}

  const thisWeek = notDone.filter(t => isDueThisWeek(t.dueDate));

  const top5 = useMemo(() => {
    return sortTasksForPathway(
      notDone.filter(t => ["Critical", "High"].includes(t.priority)),
      activePathway

  const ownerCounts = useMemo(() => {
    return OWNERS.reduce((acc, o) => {
      acc[o] = notDone.filter(t => t.owner === o).length;
      return acc;

  return (
    <div className="space-y-4">
      {/* Pathway focus card */}
      {pathway && (
        <div className="bg-slate-800 border border-teal-700 rounded-xl p-4">

          </div>
          <p className="text-slate-300 text-sm">{pathway.focus}</p>
        </div>
      )}

      {/* Stats row */}
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
        <div className="bg-slate-800 border border-slate-700 rounded-xl p-3 text-center">
          <p className={`text-3xl font-bold ${overdue.length > 0 ? "text-red-400" : "text-green-400"}`}>{overdue.length}</p>
          <p className="text-xs text-slate-400 mt-1">Overdue</p>
        </div>
        <div className="bg-slate-800 border border-slate-700 rounded-xl p-3 text-center">
          <p className="text-3xl font-bold text-orange-400">{blocked.length}</p>
          <p className="text-xs text-slate-400 mt-1">Blocked</p>
        </div>
        <div className="bg-slate-800 border border-slate-700 rounded-xl p-3 text-center">
          <p className="text-3xl font-bold text-sky-400">{thisWeek.length}</p>
          <p className="text-xs text-slate-400 mt-1">Due This Week</p>
        </div>
        <div className="bg-slate-800 border border-slate-700 rounded-xl p-3 text-center">
          <p className="text-3xl font-bold text-slate-300">{notDone.length}</p>
          <p className="text-xs text-slate-400 mt-1">Open Tasks</p>
        </div>
      </div>

      {/* Owner breakdown */}
      <div className="bg-slate-800 border border-slate-700 rounded-xl p-4">
        <h3 className="text-sm font-bold text-slate-300 mb-3 uppercase tracking-wide">Open Tasks by Owner</h3>
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
          {OWNERS.map(owner => (
            <div key={owner} className="flex items-center gap-2">
              <div className={`w-3 h-3 rounded-full`} style={{ background: OWNER_COLORS[owner].hex }} />
              <span className="text-sm text-slate-300">{owner}</span>
              <span className="ml-auto text-white font-bold">{ownerCounts[owner]}</span>
            </div>
          ))}

      {/* Today's Top 5 */}
      <div className="bg-slate-800 border border-slate-700 rounded-xl p-4">
        <h3 className="text-sm font-bold text-slate-300 mb-3 uppercase tracking-wide">Today's Top 5 Tasks</h3>

          <p className="text-slate-500 text-sm">No critical/high tasks open. 🎉</p>

          <div className="space-y-2">

// ─── IMPORT / EXPORT CONTROLS ─────────────────────────────────────────────────

function ImportExportControls({ tasks, pathways, onImport, onReset }) {
  const [showResetConfirm, setShowResetConfirm] = useState(false);
  const [importError, setImportError] = useState("");
  const fileInputRef = useRef(null);

  function exportJSON() {
    const data = JSON.stringify({ tasks, pathways, exportedAt: new Date().toISOString() }, null, 2);
    const blob = new Blob([data], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `fl-move-${todayISO()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function exportCSV() {
    const headers = ["Title", "Owner", "Frequency", "Category", "Priority", "Status", "Due Date", "Rollover Count", "Notes"];
    const rows = tasks.map(t => [
      `"${(t.title || "").replace(/"/g, '""')}"`,
      t.owner,
      t.frequency,
      t.category,
      t.priority,
      t.status,
      t.dueDate || "",
      t.rolloverCount,
      `"${(t.notes || "").replace(/"/g, '""')}"`
    ]);
    const csv = [headers.join(","), ...rows.map(r => r.join(","))].join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `fl-move-${todayISO()}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function handleImport(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.tasks && Array.isArray(data.tasks)) {
          onImport(data);
          setImportError("");
        } else {
          setImportError("Invalid file format. Expected {tasks: [...]}");
        }
      } catch {
        setImportError("Could not parse JSON file.");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  return (
    <div className="flex flex-wrap items-center gap-2">
      <button onClick={exportJSON} className="bg-slate-700 hover:bg-slate-600 text-slate-200 text-xs px-3 py-1.5 rounded border border-slate-600">⬇ Export JSON</button>
      <button onClick={exportCSV} className="bg-slate-700 hover:bg-slate-600 text-slate-200 text-xs px-3 py-1.5 rounded border border-slate-600">⬇ Export CSV</button>
      <button onClick={() => fileInputRef.current?.click()} className="bg-slate-700 hover:bg-slate-600 text-slate-200 text-xs px-3 py-1.5 rounded border border-slate-600">⬆ Import JSON</button>
      <input ref={fileInputRef} type="file" accept=".json" onChange={handleImport} className="hidden" />
      {showResetConfirm ? (
        <div className="flex items-center gap-2">
          <span className="text-xs text-red-400">Reset all data to demo?</span>
          <button onClick={() => { onReset(); setShowResetConfirm(false); }} className="bg-red-600 hover:bg-red-500 text-white text-xs px-3 py-1.5 rounded">Yes, Reset</button>
          <button onClick={() => setShowResetConfirm(false)} className="bg-slate-600 text-white text-xs px-2 py-1.5 rounded">Cancel</button>
        </div>
      ) : (
        <button onClick={() => setShowResetConfirm(true)} className="text-red-400 hover:text-red-300 text-xs px-3 py-1.5 rounded border border-red-900 hover:border-red-700">↺ Reset to Demo Data</button>
      )}
      {importError && <span className="text-red-400 text-xs">{importError}</span>}
    </div>
  );
}

// ─── CLOUD SYNC ───────────────────────────────────────────────────────────────
// Saves to Cloudflare KV via /api/data so all devices stay in sync.
// localStorage is used only as a fast cache for instant load on return visits.
// A debounced save fires 1.5 seconds after the last change to avoid hammering the API.

const SYNC_DEBOUNCE_MS = 1500;

async function loadFromCloud() {
  try {
    const res = await fetch("/api/data", { credentials: "same-origin" });
    if (!res.ok) return null;
    return await res.json(); // null means no cloud data yet
  } catch {
    return null;
  }
}

async function saveToCloud(state) {
  try {
    await fetch("/api/data", {
      method: "POST",
      credentials: "same-origin",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(state),
    });
  } catch {
    // silent — localStorage cache still has the data
  }
}

// ─── CALENDAR VIEW ────────────────────────────────────────────────────────────

const CAL_VIEWS = ["4-Month", "Month", "Week"];
const DAY_LABELS = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];

function calISO(y, m, d) {
  return `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
}

function sameDate(a, b) { return a === b; }

function getDaysInMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }
function getFirstDow(y, m)    { return new Date(y, m, 1).getDay(); }

function CalendarView({ tasks, milestones, onAddMilestone, onDeleteMilestone, onUpdateMilestone, onEditTask }) {
  const today = todayISO();
  const todayDate = new Date();

  const [viewMode, setViewMode] = useState("4-Month");
  const [anchor, setAnchor] = useState({ year: todayDate.getFullYear(), month: todayDate.getMonth() });
  const [selectedDay, setSelectedDay] = useState(null);
  const [showMilestoneForm, setShowMilestoneForm] = useState(false);
  const [editingMilestone, setEditingMilestone] = useState(null);
  const [milestoneForm, setMilestoneForm] = useState({ title: "", date: today, description: "", owner: "Both", status: "on-track" });

  // Load checklist items (from cloud) so their due dates appear on the calendar
  const [checklistItems, setChecklistItems] = useState([]);
  useEffect(() => {
    fetch("/api/checklist", { credentials: "same-origin" })
      .then(r => r.json())
      .then(cols => {
        if (!Array.isArray(cols)) return;
        const items = [];
        cols.forEach(col => col.sections.forEach(sec => sec.items.forEach(item => {
          if (item.dueDate || item.startDate) {
            items.push({ ...item, _colLabel: col.label, _secTitle: sec.title });
          }
        })));
        setChecklistItems(items);
      })
      .catch(() => {});
  }, []);

  // Build lookup: date-string → { tasks: [], milestones: [], checklist: [] }
  const dayData = useMemo(() => {
    const map = {};
    const ensure = (d) => { if (!map[d]) map[d] = { tasks: [], milestones: [], checklist: [] }; };
    tasks.forEach(t => {
      if (t.dueDate) { ensure(t.dueDate); map[t.dueDate].tasks.push(t); }
    });
    (milestones || []).forEach(m => {
      if (m.date) { ensure(m.date); map[m.date].milestones.push(m); }
    });
    checklistItems.forEach(ci => {
      if (ci.dueDate) { ensure(ci.dueDate); map[ci.dueDate].checklist.push(ci); }
    });
    return map;
  }, [tasks, milestones, checklistItems]);

  function navigate(delta) {
    if (viewMode === "Week") {
      setAnchor(a => {
        const d = new Date((a.weekStart || today) + "T00:00:00");
        d.setDate(d.getDate() + delta * 7);
        return { ...a, weekStart: d.toISOString().split("T")[0] };
      });
    } else {
      setAnchor(a => {
        let m = a.month + delta * (viewMode === "4-Month" ? 4 : 1);
        let y = a.year;
        while (m < 0)  { m += 12; y--; }
        while (m > 11) { m -= 12; y++; }
        return { year: y, month: m };
      });
    }
  }

  function goToday() {
    const now = new Date();
    setAnchor({ year: now.getFullYear(), month: now.getMonth(), weekStart: today });
    setSelectedDay(today);
  }

  function openNewMilestone(date) {
    setEditingMilestone(null);
    setMilestoneForm({ title: "", date: date || selectedDay || today, description: "", owner: "Both", status: "on-track" });
    setShowMilestoneForm(true);
  }

  function openEditMilestone(m) {
    setEditingMilestone(m);
    setMilestoneForm({ title: m.title, date: m.date, description: m.description || "", owner: m.owner || "Both", status: m.status || "on-track" });
    setShowMilestoneForm(true);
  }

  // ── Milestone chip color based on effective status ──
  function MilestoneChip({ m, mini = false }) {
    const es = effectiveMilestoneStatus(m);
    const st = MILESTONE_STATUSES[es] || MILESTONE_STATUSES["on-track"];
    return (
      <div
        onClick={e => { e.stopPropagation(); openEditMilestone(m); }}
        title={m.title}
        className={`text-xs rounded px-1 py-0.5 mb-0.5 cursor-pointer hover:opacity-80 border font-semibold truncate flex items-center gap-1 ${st.bg} ${st.text} ${st.border}`}
        style={{ maxWidth: mini ? 90 : "100%" }}
      >
        <span>★</span>
        <span className="truncate">{m.title}</span>
      </div>
    );
  }

  // ── Day dots for mini 4-month view ──
  function DayDots({ dateStr }) {
    const d = dayData[dateStr];
    if (!d) return null;
    // Show milestone chips if any (prioritized), then task dots
    const hasMilestones = d.milestones.length > 0;
    if (hasMilestones) {
      return (
        <div className="w-full mt-0.5">
          {d.milestones.slice(0, 2).map(m => {
            const es = effectiveMilestoneStatus(m);
            const st = MILESTONE_STATUSES[es] || MILESTONE_STATUSES["on-track"];
            return (
              <div key={m.id} className={`w-full rounded text-center leading-tight mb-px ${st.bg} ${st.text}`}
                style={{ fontSize: "7px", padding: "1px 2px", overflow: "hidden", whiteSpace: "nowrap", textOverflow: "ellipsis" }}>
                ★ {m.title}
              </div>
            );
          })}
          {d.milestones.length > 2 && <div style={{fontSize:"7px",color:"#94a3b8",textAlign:"center"}}>+{d.milestones.length-2}</div>}
        </div>
      );
    }
    // Task dots + checklist dots
    const clOwner = { Justin: "#3b82f6", Anna: "#ec4899", Both: "#8b5cf6" };
    const dots = [
      ...d.tasks.slice(0, 3).map(t => OWNER_COLORS[t.owner]?.hex || "#8b5cf6"),
      ...(d.checklist || []).slice(0, 2).map(ci => "#14b8a6"), // teal for checklist
    ].slice(0, 5);
    const totalExtra = d.tasks.length + (d.checklist || []).length - dots.length;
    return (
      <div className="flex flex-wrap gap-px mt-0.5 justify-center">
        {dots.map((color, i) => <div key={i} className="rounded-full" style={{ width: 5, height: 5, backgroundColor: color }} />)}
        {totalExtra > 0 && <span style={{fontSize:"7px",color:"#64748b"}}>+{totalExtra}</span>}
      </div>
    );
  }

  // ── Single month grid ──
  function MonthGrid({ year, month, mini = false }) {
    const firstDow    = getFirstDow(year, month);
    const daysInMonth = getDaysInMonth(year, month);
    const cells = [];
    for (let i = 0; i < firstDow; i++) cells.push(null);
    for (let d = 1; d <= daysInMonth; d++) cells.push(d);
    while (cells.length % 7 !== 0) cells.push(null);

    return (
      <div>
        <div className={`text-center font-bold text-slate-200 mb-2 ${mini ? "text-sm" : "text-base"}`}>
          {MONTH_NAMES[month]} {year}
        </div>
        <div className="grid grid-cols-7 gap-px mb-1">
          {DAY_LABELS.map(d => (
            <div key={d} className="text-center text-slate-500 font-medium text-xs">{mini ? d[0] : d}</div>
          ))}
        </div>
        <div className="grid grid-cols-7 gap-px">
          {cells.map((day, idx) => {
            if (!day) return <div key={idx} />;
            const dateStr    = calISO(year, month, day);
            const isToday    = dateStr === today;
            const isSelected = dateStr === selectedDay;
            const data       = dayData[dateStr];
            const hasMilestone = data && data.milestones.length > 0;
            const cellH      = mini ? "min-h-[38px]" : "min-h-[80px]";
            return (
              <div
                key={idx}
                onClick={() => setSelectedDay(dateStr === selectedDay ? null : dateStr)}
                className={`relative flex flex-col rounded cursor-pointer transition-colors p-0.5
                  ${cellH}
                  ${isToday    ? "bg-teal-800/50 ring-1 ring-teal-500" : hasMilestone ? "bg-slate-700/30" : "hover:bg-slate-700/40"}
                  ${isSelected ? "ring-2 ring-teal-400" : ""}
                `}
              >
                <span className={`text-xs font-semibold text-center ${isToday ? "text-teal-300" : hasMilestone ? "text-white" : "text-slate-400"}`}>{day}</span>
                <DayDots dateStr={dateStr} />
                {!mini && data && data.tasks.length > 0 && (
                  <div className="mt-auto">
                    {data.tasks.slice(0, 2).map(t => {
                      const c = OWNER_COLORS[t.owner] || OWNER_COLORS.Both;
                      return (
                        <div key={t.id} className={`text-xs rounded px-1 leading-tight mb-px truncate ${c.bg} ${c.text} ${t.status === "Done" ? "opacity-40 line-through" : ""}`}
                          style={{ fontSize: "10px" }}>
                          {t.title}
                        </div>
                      );
                    })}
                    {data.tasks.length > 2 && <div className="text-slate-500 text-center" style={{fontSize:"9px"}}>+{data.tasks.length-2} tasks</div>}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // ── Week grid ──
  function WeekGrid() {
    const ws = anchor.weekStart
      ? new Date(anchor.weekStart + "T00:00:00")
      : (() => { const d = new Date(); d.setDate(d.getDate() - d.getDay()); return d; })();

    const days = Array.from({ length: 7 }, (_, i) => {
      const d = new Date(ws); d.setDate(ws.getDate() + i); return d;
    });

    return (
      <div>
        <div className="text-center font-bold text-slate-200 mb-3 text-base">
          Week of {MONTH_NAMES[ws.getMonth()]} {ws.getDate()}, {ws.getFullYear()}
        </div>
        <div className="grid grid-cols-7 gap-2">
          {days.map((d, i) => {
            const dateStr    = d.toISOString().split("T")[0];
            const isToday    = dateStr === today;
            const isSelected = dateStr === selectedDay;
            const data       = dayData[dateStr] || { tasks: [], milestones: [] };
            return (
              <div key={i} onClick={() => setSelectedDay(dateStr === selectedDay ? null : dateStr)}
                className={`rounded-lg p-2 min-h-[140px] cursor-pointer border transition-colors
                  ${isToday    ? "border-teal-500 bg-teal-900/30" : "border-slate-700 bg-slate-800/60"}
                  ${isSelected ? "ring-2 ring-teal-400" : ""} hover:border-slate-500`}>
                <div className={`text-xs font-bold mb-1.5 ${isToday ? "text-teal-300" : "text-slate-400"}`}>
                  {DAY_LABELS[d.getDay()]}<br/>
                  <span className={`text-base ${isToday ? "text-teal-200" : "text-slate-200"}`}>{d.getDate()}</span>
                </div>
                {data.milestones.map(m => <MilestoneChip key={m.id} m={m} />)}
                {data.tasks.slice(0, 5).map(t => {
                  const c = OWNER_COLORS[t.owner] || OWNER_COLORS.Both;
                  return (
                    <div key={t.id} className={`text-xs rounded px-1 py-0.5 mb-0.5 truncate ${c.bg} ${c.text} ${t.status === "Done" ? "opacity-40 line-through" : ""}`}>
                      {t.title}
                    </div>
                  );
                })}
                {data.tasks.length > 5 && <div className="text-xs text-slate-500">+{data.tasks.length - 5} tasks</div>}
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // ── Selected day detail panel ──
  function DayPanel() {
    if (!selectedDay) return null;
    const data = dayData[selectedDay] || { tasks: [], milestones: [] };
    const [y, m, d] = selectedDay.split("-").map(Number);
    return (

        <div className="flex items-center justify-between mb-3">

          <div className="flex gap-2">
            <button onClick={() => openNewMilestone(selectedDay)}
              className="text-xs bg-amber-700 hover:bg-amber-600 text-white px-2 py-1 rounded">+ Milestone</button>
            <button onClick={() => setSelectedDay(null)} className="text-slate-400 hover:text-white text-sm">✕</button>
          </div>
        </div>

        {data.milestones.length === 0 && data.tasks.length === 0 && (data.checklist || []).length === 0 && (
          <p className="text-slate-500 text-sm">Nothing scheduled. Add a milestone or set task due dates here.</p>
        )}

        {data.milestones.map(m => {
          const es = effectiveMilestoneStatus(m);
          const st = MILESTONE_STATUSES[es] || MILESTONE_STATUSES["on-track"];
          return (
            <div key={m.id} className={`border rounded-lg p-3 mb-2 ${st.border} ${st.bg}/20`}>
              <div className="flex items-start justify-between gap-2">
                <div className="flex-1">
                  <div className="flex items-center gap-2 flex-wrap mb-1">
                    <span className={`text-xs font-bold uppercase px-2 py-0.5 rounded border ${st.bg} ${st.text} ${st.border}`}>★ {st.label}</span>
                    {m.owner && <OwnerBadge owner={m.owner} />}
                  </div>
                  <p className="text-white font-semibold">{m.title}</p>
                  {m.description && <p className="text-slate-300 text-sm mt-1">{m.description}</p>}
                  {/* Status toggle buttons */}
                  <div className="flex gap-1 mt-2 flex-wrap">
                    {Object.entries(MILESTONE_STATUSES).map(([key, s]) => (
                      <button key={key}
                        onClick={() => onUpdateMilestone({ ...m, status: key })}
                        className={`text-xs px-2 py-0.5 rounded border transition-all
                          ${(m.status === key || (!m.status && key === "on-track"))
                            ? `${s.bg} ${s.text} ${s.border} font-bold`
                            : "border-slate-600 text-slate-400 hover:border-slate-400"}`}>
                        {s.label}
                      </button>
                    ))}
                  </div>
                </div>
                <div className="flex gap-1 shrink-0">
                  <button onClick={() => openEditMilestone(m)} className="text-slate-400 hover:text-teal-400 text-xs px-1.5 py-0.5 rounded hover:bg-slate-700">✎</button>
                  <button onClick={() => onDeleteMilestone(m.id)} className="text-slate-500 hover:text-red-400 text-xs px-1.5 py-0.5 rounded hover:bg-slate-700">✕</button>
                </div>
              </div>
            </div>
          );
        })}

        {data.tasks.map(t => {
          const overdue = isOverdue(t.dueDate) && t.status !== "Done";
          const c = OWNER_COLORS[t.owner] || OWNER_COLORS.Both;
          return (
            <div key={t.id} className={`bg-slate-700/40 border rounded-lg p-3 mb-2 ${overdue ? "border-red-700" : "border-slate-600"} ${t.status === "Done" ? "opacity-50" : ""}`}>
              <div className="flex items-center gap-2 flex-wrap">
                <span className="w-2.5 h-2.5 rounded-full shrink-0" style={{ backgroundColor: c.hex }} />
                <span className={`font-semibold text-sm ${t.status === "Done" ? "line-through text-slate-500" : "text-white"}`}>{t.title}</span>
              </div>
              <div className="flex flex-wrap gap-1 mt-1.5">
                <OwnerBadge owner={t.owner} /><PriorityBadge priority={t.priority} /><StatusBadge status={t.status} />
                {overdue && <Badge className="bg-red-900 text-red-300">⚠ Overdue</Badge>}
              </div>
            </div>
          );
        })}

        {/* Checklist items with due dates on this day */}
        {(data.checklist || []).length > 0 && (
          <div className="mt-2 pt-2 border-t border-slate-700">
            <p className="text-xs text-teal-400 font-bold uppercase tracking-wide mb-1.5">✅ Move Checklist</p>
            {data.checklist.map(ci => {
              const ac = ci.assignee === "Justin" ? "text-blue-400" : ci.assignee === "Anna" ? "text-pink-400" : "text-purple-400";
              return (
                <div key={ci.id} className={`bg-slate-700/40 border border-slate-600 rounded-lg p-2.5 mb-1.5 ${ci.done ? "opacity-40" : ""}`}>
                  <div className="flex items-center gap-2">
                    <div className={`w-3.5 h-3.5 rounded border-2 flex items-center justify-center ${ci.done ? "bg-emerald-600 border-emerald-600" : "border-slate-500"}`}>
                      {ci.done && <span className="text-white leading-none" style={{fontSize:"8px"}}>✓</span>}

                  </div>
                  <div className="flex flex-wrap gap-1.5 mt-1 pl-5">
                    <span className={`text-xs font-medium ${ac}`}>{ci.assignee}</span>

                    {ci.notes && <span className="text-xs text-slate-600">📝 has notes</span>}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  }

  // ── Add / Edit Milestone modal ──
  function MilestoneModal() {
    return (
      <div className="modal-overlay fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4"
        onClick={e => e.target === e.currentTarget && setShowMilestoneForm(false)}>
        <div className="bg-slate-800 border border-slate-700 rounded-xl w-full max-w-md p-5 shadow-2xl">
          <div className="flex items-center justify-between mb-4">
            <h3 className="text-white font-bold text-lg">{editingMilestone ? "Edit Milestone" : "Add Milestone"}</h3>
            <button onClick={() => setShowMilestoneForm(false)} className="text-slate-400 hover:text-white">✕</button>
          </div>
          <div className="space-y-3">
            <div>
              <label className="block text-xs text-slate-400 mb-1">Title *</label>
              <input value={milestoneForm.title} onChange={e => setMilestoneForm(f => ({...f, title: e.target.value}))}
                className="w-full bg-slate-700 border border-slate-600 text-white rounded px-3 py-2 text-sm"
                placeholder="e.g. Anna receives FL job offer" />
            </div>
            <div>
              <label className="block text-xs text-slate-400 mb-1">Target Date</label>
              <input type="date" value={milestoneForm.date} onChange={e => setMilestoneForm(f => ({...f, date: e.target.value}))}
                className="w-full bg-slate-700 border border-slate-600 text-white rounded px-3 py-2 text-sm" />
            </div>
            <div>
              <label className="block text-xs text-slate-400 mb-1">Status</label>
              <div className="flex gap-1 flex-wrap">
                {Object.entries(MILESTONE_STATUSES).map(([key, s]) => (
                  <button key={key} type="button"
                    onClick={() => setMilestoneForm(f => ({...f, status: key}))}
                    className={`text-xs px-2.5 py-1 rounded border transition-all font-medium
                      ${milestoneForm.status === key ? `${s.bg} ${s.text} ${s.border}` : "border-slate-600 text-slate-400 hover:border-slate-400"}`}>
                    {s.label}
                  </button>
                ))}
              </div>
            </div>
            <div>
              <label className="block text-xs text-slate-400 mb-1">Description</label>
              <textarea value={milestoneForm.description} onChange={e => setMilestoneForm(f => ({...f, description: e.target.value}))}
                rows={2} className="w-full bg-slate-700 border border-slate-600 text-white rounded px-3 py-2 text-sm"
                placeholder="What does success look like for this milestone?" />
            </div>
            <div>
              <label className="block text-xs text-slate-400 mb-1">Owner</label>
              <select value={milestoneForm.owner} onChange={e => setMilestoneForm(f => ({...f, owner: e.target.value}))}
                className="w-full bg-slate-700 border border-slate-600 text-white rounded px-3 py-2 text-sm">
                {OWNERS.map(o => <option key={o}>{o}</option>)}
              </select>
            </div>
          </div>
          <div className="flex justify-between gap-2 mt-4">
            <div>
              {editingMilestone && (
                <button onClick={() => { onDeleteMilestone(editingMilestone.id); setShowMilestoneForm(false); }}
                  className="text-red-400 hover:text-red-300 text-sm px-3 py-2 rounded border border-red-800 hover:border-red-600">Delete</button>
              )}
            </div>
            <div className="flex gap-2">
              <button onClick={() => setShowMilestoneForm(false)} className="bg-slate-600 text-white text-sm px-4 py-2 rounded">Cancel</button>
              <button
                onClick={() => {
                  if (!milestoneForm.title.trim()) return;
                  if (editingMilestone) {
                    onUpdateMilestone({ ...editingMilestone, ...milestoneForm });
                  } else {
                    onAddMilestone({ ...milestoneForm, id: genId(), createdAt: new Date().toISOString() });
                  }
                  setShowMilestoneForm(false);
                  setMilestoneForm({ title: "", date: today, description: "", owner: "Both", status: "on-track" });
                }}
                className="bg-amber-600 hover:bg-amber-500 text-white text-sm px-4 py-2 rounded font-semibold">
                {editingMilestone ? "Save Changes" : "Add Milestone"}
              </button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ── All milestones sidebar (sorted by date, color-coded) ──
  const sortedMilestones = useMemo(() => {
    return [...(milestones || [])].sort((a, b) => a.date.localeCompare(b.date));
  }, [milestones]);

  const overdueMilestones  = sortedMilestones.filter(m => effectiveMilestoneStatus(m) === "overdue");
  const atRiskMilestones   = sortedMilestones.filter(m => effectiveMilestoneStatus(m) === "at-risk");
  const upcomingMilestones = sortedMilestones.filter(m => !["overdue","done"].includes(effectiveMilestoneStatus(m)) && m.date >= today);

  return (
    <div>
      {showMilestoneForm && <MilestoneModal />}

      {/* Header */}
      <div className="flex flex-wrap items-center justify-between gap-3 mb-4">
        <div>
          <h2 className="text-xl font-bold text-white">Calendar &amp; Milestones</h2>
          <p className="text-sm text-slate-400">Key life events + task due dates. Milestones turn red when off track.</p>
        </div>
        <div className="flex items-center gap-2 flex-wrap">
          {CAL_VIEWS.map(v => (
            <button key={v} onClick={() => setViewMode(v)}
              className={`text-sm px-3 py-1.5 rounded-lg border font-medium transition-all
                ${viewMode === v ? "bg-teal-700 border-teal-600 text-white" : "border-slate-700 text-slate-400 hover:border-slate-500 hover:text-white"}`}>{v}</button>
          ))}
          <div className="flex items-center gap-1">
            <button onClick={() => navigate(-1)} className="bg-slate-700 hover:bg-slate-600 text-white px-2.5 py-1.5 rounded-lg text-sm">◀</button>
            <button onClick={goToday}           className="bg-teal-700 hover:bg-teal-600 text-white px-3 py-1.5 rounded-lg text-sm font-medium">Today</button>
            <button onClick={() => navigate(1)} className="bg-slate-700 hover:bg-slate-600 text-white px-2.5 py-1.5 rounded-lg text-sm">▶</button>
          </div>
          <button onClick={() => openNewMilestone(selectedDay || today)}
            className="text-sm bg-amber-700 hover:bg-amber-600 text-white px-3 py-1.5 rounded-lg font-medium">+ Milestone</button>
        </div>
      </div>

      {/* Status legend */}
      <div className="flex flex-wrap gap-3 mb-4 text-xs">
        {Object.entries(MILESTONE_STATUSES).map(([k, s]) => (
          <span key={k} className={`flex items-center gap-1.5 px-2 py-1 rounded border ${s.bg} ${s.text} ${s.border}`}>
            ★ {s.label}
          </span>
        ))}
        {Object.entries(OWNER_COLORS).map(([name, c]) => (
          <span key={name} className="flex items-center gap-1.5 text-slate-400">
            <span className="w-2.5 h-2.5 rounded-full" style={{ backgroundColor: c.hex }} />{name} tasks
          </span>
        ))}
      </div>

      {/* Off-track / at-risk alert banner */}
      {(overdueMilestones.length > 0 || atRiskMilestones.length > 0) && (
        <div className="mb-4 bg-red-950 border border-red-800 rounded-xl p-3">
          <p className="text-red-300 text-sm font-bold mb-2">⚠ Attention Needed</p>
          <div className="flex flex-wrap gap-2">
            {overdueMilestones.map(m => (
              <button key={m.id} onClick={() => { setSelectedDay(m.date); openEditMilestone(m); }}
                className="text-xs bg-red-900 border border-red-700 text-red-200 px-2 py-1 rounded hover:bg-red-800 transition-colors">
                ★ {m.title} — {formatDate(m.date)}
              </button>
            ))}
            {atRiskMilestones.map(m => (
              <button key={m.id} onClick={() => { setSelectedDay(m.date); openEditMilestone(m); }}
                className="text-xs bg-yellow-900 border border-yellow-700 text-yellow-200 px-2 py-1 rounded hover:bg-yellow-800 transition-colors">
                ★ {m.title} — {formatDate(m.date)}
              </button>
            ))}
          </div>
        </div>
      )}

      <div className="grid grid-cols-1 xl:grid-cols-4 gap-6">
        {/* Calendar grid */}
        <div className="xl:col-span-3">
          {viewMode === "4-Month" && (
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
              {[0,1,2,3].map(offset => {
                let m = anchor.month + offset, y = anchor.year;
                while (m > 11) { m -= 12; y++; }
                return (
                  <div key={offset} className="bg-slate-800/60 border border-slate-700 rounded-xl p-3">
                    <MonthGrid year={y} month={m} mini={true} />
                  </div>
                );
              })}
            </div>
          )}
          {viewMode === "Month" && (
            <div className="bg-slate-800/60 border border-slate-700 rounded-xl p-4">
              <MonthGrid year={anchor.year} month={anchor.month} mini={false} />
            </div>
          )}
          {viewMode === "Week" && (
            <div className="bg-slate-800/60 border border-slate-700 rounded-xl p-4">
              <WeekGrid />
            </div>
          )}
          <DayPanel />
        </div>

        {/* Milestone tracker sidebar */}
        <div className="xl:col-span-1 space-y-4">
          {overdueMilestones.length > 0 && (
            <div className="bg-red-950/60 border border-red-800 rounded-xl p-3">
              <h3 className="text-xs font-bold text-red-400 uppercase tracking-wide mb-2">🔴 Off Track</h3>
              {overdueMilestones.map(m => (
                <button key={m.id} onClick={() => { setSelectedDay(m.date); openEditMilestone(m); }}
                  className="w-full text-left mb-1.5 last:mb-0">
                  <p className="text-red-200 text-xs font-semibold leading-snug">{m.title}</p>
                  <p className="text-red-400 text-xs">{formatDate(m.date)}</p>
                </button>
              ))}
            </div>
          )}
          {atRiskMilestones.length > 0 && (
            <div className="bg-yellow-950/60 border border-yellow-800 rounded-xl p-3">
              <h3 className="text-xs font-bold text-yellow-400 uppercase tracking-wide mb-2">🟡 At Risk</h3>
              {atRiskMilestones.map(m => (
                <button key={m.id} onClick={() => { setSelectedDay(m.date); openEditMilestone(m); }}
                  className="w-full text-left mb-1.5 last:mb-0">
                  <p className="text-yellow-200 text-xs font-semibold leading-snug">{m.title}</p>
                  <p className="text-yellow-400 text-xs">{formatDate(m.date)}</p>
                </button>
              ))}
            </div>
          )}
          {upcomingMilestones.length > 0 && (
            <div className="bg-slate-800 border border-slate-700 rounded-xl p-3">
              <h3 className="text-xs font-bold text-emerald-400 uppercase tracking-wide mb-2">🟢 On Track</h3>
              {upcomingMilestones.slice(0, 8).map(m => {
                const es = effectiveMilestoneStatus(m);
                const st = MILESTONE_STATUSES[es];
                return (
                  <button key={m.id} onClick={() => { setSelectedDay(m.date); openEditMilestone(m); }}
                    className="w-full text-left mb-2 last:mb-0">
                    <p className="text-slate-200 text-xs font-semibold leading-snug">{m.title}</p>
                    <p className={`text-xs ${st.text}`}>{formatDate(m.date)}</p>
                  </button>
                );
              })}
            </div>
          )}
          <button onClick={() => openNewMilestone(today)}
            className="w-full text-xs border border-dashed border-slate-600 text-slate-400 hover:border-amber-600 hover:text-amber-400 rounded-xl py-2 transition-colors">
            + Add Milestone
          </button>
        </div>
      </div>
    </div>
  );
}

function MoveChecklist({ tasks }) {
  const [columns, setColumns] = useState(null);
  const [activeCol, setActiveCol] = useState("current-house");
  const [loading, setLoading]   = useState(true);
  const [filter, setFilter]     = useState(""); // search text
  const saveTimer = useRef(null);

  // Load from cloud on mount
  useEffect(() => {
    setLoading(true);
    fetch("/api/checklist", { credentials: "same-origin" })
      .then(r => r.json())
      .then(data => {
        if (data && Array.isArray(data)) {
          setColumns(data);
        } else {
          const seed = generateSeedChecklist();
          setColumns(seed);
          saveChecklist(seed);
        }
      })
      .catch(() => { setColumns(generateSeedChecklist()); })
      .finally(() => setLoading(false));
  }, []);

  function saveChecklist(cols) {
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      fetch("/api/checklist", {
        method: "POST",
        credentials: "same-origin",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(cols),
      }).catch(() => {});
    }, 1000);
  }

  function updateItem(colId, sectionId, itemId, updates) {
    setColumns(prev => {
      const next = prev.map(col => {
        if (col.id !== colId) return col;
        return {
          ...col,
          sections: col.sections.map(sec => {
            if (sec.id !== sectionId) return sec;
            return {
              ...sec,
              items: sec.items.map(item =>
                item.id === itemId ? { ...item, ...updates } : item
              ),
            };
          }),
        };
      });
      saveChecklist(next);
      return next;
    });
  }

  function addItem(colId, sectionId, text) {
    if (!text.trim()) return;
    setColumns(prev => {
      const next = prev.map(col => {
        if (col.id !== colId) return col;
        return {
          ...col,
          sections: col.sections.map(sec => {
            if (sec.id !== sectionId) return sec;
            return { ...sec, items: [...sec.items, {
              id: uid(), text: text.trim(), done: false,
              dueDate: null, startDate: null, status: "not-started", assignee: "Both", notes: "",
              subtasks: [],
            }] };
          }),
        };
      });
      saveChecklist(next);
      return next;
    });
  }

  function deleteItem(colId, sectionId, itemId) {
    setColumns(prev => {
      const next = prev.map(col => {
        if (col.id !== colId) return col;
        return {
          ...col,
          sections: col.sections.map(sec => {
            if (sec.id !== sectionId) return sec;
            return { ...sec, items: sec.items.filter(i => i.id !== itemId) };
          }),
        };
      });
      saveChecklist(next);
      return next;
    });
  }

  if (loading || !columns) {
    return <div className="text-slate-400 text-sm text-center py-16">Loading checklist…</div>;
  }

  const col = columns.find(c => c.id === activeCol) || columns[0];

  // Overall progress across all columns
  const allItems   = columns.flatMap(c => c.sections.flatMap(s => s.items));
  const totalDone  = allItems.filter(i => i.done).length;
  const totalItems = allItems.length;
  const pct        = totalItems > 0 ? Math.round((totalDone / totalItems) * 100) : 0;

  // Column progress
  function colProgress(c) {
    const items = c.sections.flatMap(s => s.items);
    const done  = items.filter(i => i.done).length;
    return { done, total: items.length, pct: items.length > 0 ? Math.round((done / items.length) * 100) : 0 };
  }

  // Filter items by search
  function matchesFilter(text) {
    return !filter || text.toLowerCase().includes(filter.toLowerCase());
  }

  return (
    <div>
      {/* Header */}
      <div className="flex flex-wrap items-start justify-between gap-3 mb-4">
        <div>
          <h2 className="text-xl font-bold text-white">Move Checklist</h2>
          <p className="text-sm text-slate-400">Comprehensive household move tracker. Saved to the cloud — shared across all devices.</p>
        </div>
        <div className="flex items-center gap-3">
          <input value={filter} onChange={e => setFilter(e.target.value)} placeholder="Search…"
            className="bg-slate-800 border border-slate-700 text-slate-200 text-xs px-3 py-1.5 rounded-lg outline-none focus:border-teal-500 w-40" />
          <div className="text-right">
            <span className="text-teal-400 text-sm font-bold">{pct}%</span>
            <span className="text-slate-500 text-xs ml-1">complete</span>
            <div className="w-32 bg-slate-700 rounded-full h-1.5 mt-1">
              <div className="bg-teal-500 h-1.5 rounded-full transition-all" style={{ width: `${pct}%` }} />
            </div>
            <p className="text-slate-600 text-xs mt-0.5">{totalDone} / {totalItems} items</p>
          </div>
        </div>
      </div>

      {/* Column tabs — horizontal scroll on mobile */}
      <div className="flex gap-1.5 overflow-x-auto pb-2 mb-5 scrollbar-thin">
        {columns.map(c => {
          const cp = colProgress(c);
          const isActive = c.id === activeCol;
          return (
            <button key={c.id} onClick={() => setActiveCol(c.id)}
              className={`shrink-0 text-xs px-3 py-2 rounded-lg border transition-all font-medium whitespace-nowrap
                ${isActive
                  ? "bg-teal-700 border-teal-600 text-white"
                  : cp.done === cp.total && cp.total > 0
                    ? "bg-emerald-900/40 border-emerald-700 text-emerald-300"
                    : "border-slate-700 text-slate-400 hover:border-slate-500 hover:text-white"}`}>
              {c.label}
              {cp.total > 0 && (
                <span className={`ml-1.5 text-xs ${isActive ? "text-teal-200" : cp.done === cp.total ? "text-emerald-400" : "text-slate-500"}`}>
                  {cp.done}/{cp.total}
                </span>
              )}
            </button>
          );
        })}
      </div>

      {/* Active column content */}
      <div className="space-y-4">
        {col.sections.map(sec => {
          const secItems  = sec.items.filter(i => matchesFilter(i.text));
          const secDone   = sec.items.filter(i => i.done).length;
          const secTotal  = sec.items.length;
          if (filter && secItems.length === 0) return null;

          return (
            <SectionPanel
              key={sec.id}
              section={sec}
              filteredItems={secItems}
              secDone={secDone}
              secTotal={secTotal}
              colId={col.id}
              onUpdateItem={(itemId, updates) => updateItem(col.id, sec.id, itemId, updates)}
              onAdd={(text) => addItem(col.id, sec.id, text)}
              onDelete={(itemId) => deleteItem(col.id, sec.id, itemId)}
            />
          );
        })}
      </div>
    </div>
  );
}

// ── Nested sub-checklist for Move Checklist items ──
// Reusable editable checklist row — used for both subtasks and sub-subtasks
function EditableCheckRow({ item, onToggle, onUpdate, onDelete, depth = 0, children }) {
  const [editing, setEditing] = useState(false);
  const [editText, setEditText] = useState(item.text);

  function save() {
    if (editText.trim() && editText.trim() !== item.text) {
      onUpdate(item.id, { text: editText.trim() });
    }
    setEditing(false);
  }

  return (
    <div style={{ paddingLeft: depth * 16 }}>
      <div className="flex items-start gap-2 group py-0.5 rounded hover:bg-slate-700/20 px-1">
        <button onClick={() => onToggle(item.id)}
          className={`mt-0.5 w-3.5 h-3.5 rounded border-2 flex items-center justify-center shrink-0 transition-all
            ${item.done ? "bg-emerald-600 border-emerald-600" : "border-slate-500 hover:border-teal-400"}`}>
          {item.done && <span className="text-white leading-none" style={{fontSize:"8px"}}>✓</span>}
        </button>

        {editing ? (
          <input autoFocus value={editText} onChange={e => setEditText(e.target.value)}
            onKeyDown={e => { if (e.key === "Enter") save(); if (e.key === "Escape") { setEditText(item.text); setEditing(false); } }}
            onBlur={save}
            className="flex-1 bg-slate-900 border border-teal-600 text-slate-200 text-xs px-2 py-0.5 rounded outline-none" />
        ) : (
          <span
            onDoubleClick={() => { setEditText(item.text); setEditing(true); }}
            className={`text-xs flex-1 leading-snug cursor-text ${item.done ? "line-through text-slate-500" : "text-slate-300"}`}>
            {item.text}
          </span>
        )}

        <div className="flex items-center gap-0.5 shrink-0 opacity-0 group-hover:opacity-100 transition-opacity">
          <button onClick={() => { setEditText(item.text); setEditing(true); }}
            className="text-slate-600 hover:text-teal-400 text-xs px-1" title="Edit">✎</button>
          <button onClick={() => onDelete(item.id)}
            className="text-slate-700 hover:text-red-400 text-xs px-1" title="Delete">✕</button>
        </div>
      </div>
      {children}
    </div>
  );
}

function ChecklistSubtasks({ subtasks, onChange }) {
  const [newText, setNewText] = useState("");
  const [newSubSubText, setNewSubSubText] = useState({}); // { [subtaskId]: string }

  function toggle(id) {
    onChange(subtasks.map(s => s.id === id ? { ...s, done: !s.done } : s));
  }
  function update(id, updates) {
    onChange(subtasks.map(s => s.id === id ? { ...s, ...updates } : s));
  }
  function remove(id) {
    onChange(subtasks.filter(s => s.id !== id));
  }
  function add() {
    if (!newText.trim()) return;
    onChange([...subtasks, { id: uid(), text: newText.trim(), done: false, children: [] }]);
    setNewText("");
  }

  // Sub-subtask handlers
  function toggleChild(parentId, childId) {
    onChange(subtasks.map(s => {
      if (s.id !== parentId) return s;
      return { ...s, children: (s.children || []).map(c => c.id === childId ? { ...c, done: !c.done } : c) };
    }));
  }
  function updateChild(parentId, childId, updates) {
    onChange(subtasks.map(s => {
      if (s.id !== parentId) return s;
      return { ...s, children: (s.children || []).map(c => c.id === childId ? { ...c, ...updates } : c) };
    }));
  }
  function removeChild(parentId, childId) {
    onChange(subtasks.map(s => {
      if (s.id !== parentId) return s;
      return { ...s, children: (s.children || []).filter(c => c.id !== childId) };
    }));
  }
  function addChild(parentId) {
    const text = (newSubSubText[parentId] || "").trim();
    if (!text) return;
    onChange(subtasks.map(s => {
      if (s.id !== parentId) return s;
      return { ...s, children: [...(s.children || []), { id: uid(), text, done: false }] };
    }));
    setNewSubSubText(prev => ({ ...prev, [parentId]: "" }));
  }

  const doneCount = subtasks.filter(s => s.done).length;

  return (
    <div>
      <div className="flex items-center gap-2 mb-1.5">
        <label className="block text-xs text-slate-500 uppercase tracking-wide">Sub-Checklist</label>
        {subtasks.length > 0 && (
          <span className="text-xs text-slate-500">{doneCount}/{subtasks.length}</span>
        )}
        <span className="text-xs text-slate-600 italic">double-click to edit</span>
      </div>

      {subtasks.length > 0 && (
        <div className="mb-2 pl-0.5">
          {subtasks.map(s => {
            const kids = s.children || [];
            const kidsDone = kids.filter(c => c.done).length;
            return (
              <EditableCheckRow key={s.id} item={s} depth={0}
                onToggle={toggle} onUpdate={(id, u) => update(id, u)} onDelete={remove}>

                {/* Sub-subtasks */}
                {kids.length > 0 && (
                  <div className="ml-5 border-l border-slate-700 pl-1 mt-0.5">
                    {kids.map(c => (
                      <EditableCheckRow key={c.id} item={c} depth={0}
                        onToggle={(id) => toggleChild(s.id, id)}
                        onUpdate={(id, u) => updateChild(s.id, id, u)}
                        onDelete={(id) => removeChild(s.id, id)}
                      />
                    ))}
                  </div>
                )}

                {/* Add sub-subtask */}
                <div className="ml-5 mt-1 mb-1.5 flex gap-1.5">
                  <input
                    value={newSubSubText[s.id] || ""}
                    onChange={e => setNewSubSubText(prev => ({ ...prev, [s.id]: e.target.value }))}
                    onKeyDown={e => { if (e.key === "Enter") addChild(s.id); }}
                    placeholder="Add sub-sub-item…"
                    className="flex-1 bg-slate-950 border border-slate-700 text-slate-200 text-xs px-2 py-0.5 rounded outline-none focus:border-teal-500 placeholder-slate-600" />
                  <button onClick={() => addChild(s.id)}
                    className="bg-slate-700 hover:bg-slate-600 text-white text-xs px-2 py-0.5 rounded">+</button>
                </div>
              </EditableCheckRow>
            );
          })}
        </div>
      )}

      <div className="flex gap-2">
        <input value={newText} onChange={e => setNewText(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter") add(); }}
          placeholder="Add sub-item…"
          className="flex-1 bg-slate-950 border border-slate-700 text-slate-200 text-xs px-2 py-1 rounded outline-none focus:border-teal-500 placeholder-slate-600" />
        <button onClick={add}
          className="bg-slate-700 hover:bg-slate-600 text-white text-xs px-2.5 py-1 rounded">Add</button>
      </div>
    </div>
  );
}
