// ─── UTILITIES ────────────────────────────────────────────────────────────────

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function todayISO() {
  return new Date().toISOString().split("T")[0];
}

function tomorrowISO() {
  const d = new Date();
  d.setDate(d.getDate() + 1);
  return d.toISOString().split("T")[0];
}

function formatDate(iso) {
  if (!iso) return "";
  const [y, m, d] = iso.split("-");
  return `${m}/${d}/${y}`;
}

function isOverdue(dueDate) {
  if (!dueDate) return false;
  return dueDate < todayISO();
}

function isDueThisWeek(dueDate) {
  if (!dueDate) return false;
  const today = new Date();
  const due = new Date(dueDate);
  const diff = (due - today) / (1000 * 60 * 60 * 24);
  return diff >= 0 && diff <= 7;
}

// ─── ROLLOVER LOGIC ────────────────────────────────────────────────────────────
// Called on app load and conceptually at midnight.
// For each incomplete task with a past dueDate and autoRollover=true:
//   - Save originalDueDate if not yet set
//   - Increment rolloverCount
//   - Add entry to rolloverHistory
//   - Set dueDate to today
//   - If rolloverCount >= 3: task gets a warning badge

function runRolloverCheck(tasks) {
  const today = todayISO();
  return tasks.map(task => {
    if (
      task.status !== "Done" &&
      task.dueDate &&
      task.dueDate < today &&
      task.autoRollover
    ) {
      const fromDate = task.dueDate;
      const newTask = {
        ...task,
        originalDueDate: task.originalDueDate || fromDate,
        rolloverCount: (task.rolloverCount || 0) + 1,
        rolloverHistory: [
          ...(task.rolloverHistory || []),
          { date: today, fromDate, toDate: today }
        ],
        dueDate: today,
        updatedAt: new Date().toISOString()
      };
      return newTask;
    }
    return task;
  });
}

// ─── PATHWAY PRIORITY LOGIC ───────────────────────────────────────────────────
// When the active pathway changes:
//   1. Tasks with pathwaySortOrder[pathwayId] use that value for sorting.
//   2. Tasks whose pathways[] includes the active pathway get boosted (tier 0).
//   3. Tasks NOT in the active pathway's list get deprioritized (tier 1, lower opacity).
//   4. manuallyOrdered tasks keep position unless "Reset to Recommended Order" is clicked.
//   5. "Reset to Recommended Order" clears manuallyOrdered flags and re-applies pathway sort.

function sortTasksForPathway(tasks, pathwayId) {
  const PRIORITY_WEIGHT = { Critical: 0, High: 1, Medium: 2, Low: 3 };
  return [...tasks].sort((a, b) => {
    if (a.manuallyOrdered && b.manuallyOrdered) {
      const aOrder = a.pathwaySortOrder?.[pathwayId] ?? a.sortOrder;
      const bOrder = b.pathwaySortOrder?.[pathwayId] ?? b.sortOrder;
      return aOrder - bOrder;
    }
    const aInPathway = a.pathways.includes(pathwayId);
    const bInPathway = b.pathways.includes(pathwayId);
    if (aInPathway && !bInPathway) return -1;
    if (!aInPathway && bInPathway) return 1;
    const aPriority = PRIORITY_WEIGHT[a.priority] ?? 4;
    const bPriority = PRIORITY_WEIGHT[b.priority] ?? 4;
    if (aPriority !== bPriority) return aPriority - bPriority;
    const aOrder = a.pathwaySortOrder?.[pathwayId] ?? a.sortOrder;
    const bOrder = b.pathwaySortOrder?.[pathwayId] ?? b.sortOrder;
    return aOrder - bOrder;
  });
}

// ─── READINESS SCORE ──────────────────────────────────────────────────────────

function calcReadinessScore(tasks) {
  const done = (cats) => tasks.filter(t => cats.includes(t.category) && t.status === "Done").length;
  const total = (cats) => Math.max(1, tasks.filter(t => cats.includes(t.category)).length);

  const annaScore = (done(["Anna Career"]) / total(["Anna Career"])) * 15;
  const justinScore = (done(["Justin Career"]) / total(["Justin Career"])) * 10;
  const bizScore = (done(["RetroMotion", "Venetian Soda Lounge", "Venetian Beverages"]) / total(["RetroMotion", "Venetian Soda Lounge", "Venetian Beverages"])) * 20;
  const legalScore = (done(["Legal / Debt / CPA"]) / total(["Legal / Debt / CPA"])) * 15;
  const vtScore = (done(["Vermont Home"]) / total(["Vermont Home"])) * 10;
  const flScore = (done(["Florida Housing"]) / total(["Florida Housing"])) * 10;
  const kidsScore = (done(["Kids / Schools"]) / total(["Kids / Schools"])) * 5;
  const cashScore = (done(["Budget / Cash Flow"]) / total(["Budget / Cash Flow"])) * 10;
  const sevenDaysAgo = new Date(); sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
  const recentDone = tasks.filter(t => t.completionDate && new Date(t.completionDate) >= sevenDaysAgo).length;
  const momentumScore = Math.min(5, (recentDone / Math.max(1, tasks.length)) * 100);

  const total_score = Math.round(annaScore + justinScore + bizScore + legalScore + vtScore + flScore + kidsScore + cashScore + momentumScore);
  return Math.min(100, Math.max(0, total_score));
}

function scoreColor(score) {
  if (score >= 80) return "text-green-400";
  if (score >= 60) return "text-yellow-400";
  if (score >= 40) return "text-orange-400";
  return "text-red-400";
}

  if (score >= 80) return "bg-green-500";
  if (score >= 60) return "bg-yellow-500";
  if (score >= 40) return "bg-orange-500";
  return "bg-red-500";
}

    onChange([...subtasks, { id: genId(), title: newTitle.trim(), done: false }]);
    setNewTitle("");
  }
  function toggle(id) {
    onChange(subtasks.map(s => s.id === id ? { ...s, done: !s.done } : s));
  }
  function remove(id) {
    onChange(subtasks.filter(s => s.id !== id));
  }
  return (
    <div>
      {subtasks.map(s => (
        <div key={s.id} className="flex items-center gap-2 py-1">
          <input type="checkbox" checked={s.done} onChange={() => toggle(s.id)} className="rounded" />
          <span className={`flex-1 text-sm ${s.done ? "line-through text-slate-500" : "text-slate-200"}`}>{s.title}</span>
          <button onClick={() => remove(s.id)} className="text-red-400 hover:text-red-300 text-xs">✕</button>
        </div>
      ))}
      <div className="flex gap-2 mt-2">
        <input
          value={newTitle}
          onChange={e => setNewTitle(e.target.value)}
          onKeyDown={e => e.key === "Enter" && add()}
          placeholder="Add subtask..."
          className="flex-1 bg-slate-700 border border-slate-600 text-slate-200 text-sm rounded px-2 py-1"
        />
        <button onClick={add} className="bg-teal-600 hover:bg-teal-500 text-white text-sm px-3 py-1 rounded">Add</button>
      </div>
    </div>
  );
}

function BulkActionBar({ selectedIds, tasks, onUpdate, onClear }) {
  const [bulkStatus, setBulkStatus] = useState("");
  const [bulkPriority, setBulkPriority] = useState("");
  const [bulkOwner, setBulkOwner] = useState("");

  function apply() {
    const updates = {};
    if (bulkStatus) updates.status = bulkStatus;
    if (bulkPriority) updates.priority = bulkPriority;
    if (bulkOwner) updates.owner = bulkOwner;
    if (Object.keys(updates).length) {
      onUpdate(selectedIds, updates);
      onClear();
    }
  }

  return (
    <div className="flex items-center gap-2 flex-wrap bg-slate-700 rounded-lg px-3 py-2 text-xs">
      <span className="text-slate-300 font-semibold">{selectedIds.length} selected</span>

        <option value="">Set Status...</option>

        <option value="">Set Priority...</option>
        {PRIORITIES.map(p => <option key={p}>{p}</option>)}

// ─── TASK SECTION ─────────────────────────────────────────────────────────────

function TaskSection({ frequency, tasks, activePathway, onUpdate, onDelete, onAdd, onBulkUpdate }) {
  const [collapsed, setCollapsed] = useState(false);
  const [filters, setFilters] = useState({});
  const [bulkMode, setBulkMode] = useState(false);
  const [selectedIds, setSelectedIds] = useState([]);
  const [editingTask, setEditingTask] = useState(null);

  const sectionTasks = useMemo(() => {
    let t = tasks.filter(task => task.frequency === frequency);
    // PATHWAY PRIORITY LOGIC: sort by active pathway
    t = sortTasksForPathway(t, activePathway);
    // Apply filters
    if (filters.owner) t = t.filter(task => task.owner === filters.owner);
    if (filters.category) t = t.filter(task => task.category === filters.category);
    if (filters.status) t = t.filter(task => task.status === filters.status);
    if (filters.priority) t = t.filter(task => task.priority === filters.priority);
    if (filters.search) {
      const s = filters.search.toLowerCase();
      t = t.filter(task => task.title.toLowerCase().includes(s) || task.notes?.toLowerCase().includes(s));
    }
    return t;
  }, [tasks, frequency, activePathway, filters]);

  const done = sectionTasks.filter(t => t.status === "Done").length;
  const blocked = sectionTasks.filter(t => t.status === "Blocked").length;

  function handleMoveUp(taskId) {
    const idx = sectionTasks.findIndex(t => t.id === taskId);
    if (idx <= 0) return;
    const above = sectionTasks[idx - 1];
    const current = sectionTasks[idx];
    onUpdate([
      { ...current, sortOrder: above.sortOrder - 0.5, manuallyOrdered: true, pathwaySortOrder: { ...current.pathwaySortOrder, [activePathway]: above.sortOrder - 0.5 } },
      { ...above, sortOrder: above.sortOrder + 0.5, manuallyOrdered: true, pathwaySortOrder: { ...above.pathwaySortOrder, [activePathway]: above.sortOrder + 0.5 } }
    ]);
  }

  function handleMoveDown(taskId) {
    const idx = sectionTasks.findIndex(t => t.id === taskId);
    if (idx >= sectionTasks.length - 1) return;
    const below = sectionTasks[idx + 1];
    const current = sectionTasks[idx];
    onUpdate([
      { ...current, sortOrder: below.sortOrder + 0.5, manuallyOrdered: true, pathwaySortOrder: { ...current.pathwaySortOrder, [activePathway]: below.sortOrder + 0.5 } },
      { ...below, sortOrder: below.sortOrder - 0.5, manuallyOrdered: true, pathwaySortOrder: { ...below.pathwaySortOrder, [activePathway]: below.sortOrder - 0.5 } }
    ]);
  }

  function handleStatusChange(task) {
    const cycle = ["Not Started", "In Progress", "Blocked", "Done"];
    const nextIdx = (cycle.indexOf(task.status) + 1) % cycle.length;
    const newStatus = cycle[nextIdx];
    onUpdate([{
      ...task,
      status: newStatus,
      completionDate: newStatus === "Done" ? new Date().toISOString() : task.completionDate,
      updatedAt: new Date().toISOString()
    }]);
  }

  function handleResetOrder() {
    const tasksInSection = tasks.filter(t => t.frequency === frequency);
    onUpdate(tasksInSection.map(t => ({ ...t, manuallyOrdered: false, pathwaySortOrder: {} })));
  }

  function toggleSelect(id) {
    setSelectedIds(ids => ids.includes(id) ? ids.filter(i => i !== id) : [...ids, id]);
  }

  const bgColor = frequency === "Daily" ? "bg-teal-900/30" : frequency === "Weekly" ? "bg-blue-900/30" : "bg-purple-900/30";
  const borderColor = frequency === "Daily" ? "border-teal-700" : frequency === "Weekly" ? "border-blue-700" : "border-purple-700";

  return (
    <div className={`rounded-xl border ${borderColor} ${bgColor} overflow-hidden mb-4`}>
      {/* Section Header */}
      <div
        className="flex items-center justify-between px-4 py-3 cursor-pointer"
        onClick={() => setCollapsed(v => !v)}
      >
        <div className="flex items-center gap-3">
          <span className="text-xl">{frequency === "Daily" ? "📅" : frequency === "Weekly" ? "📆" : "🗓"}</span>
          <h3 className="text-lg font-bold text-white">{frequency} Tasks</h3>
          <Badge className="bg-slate-700 text-slate-300">{sectionTasks.length}</Badge>
          {done > 0 && <Badge className="bg-emerald-800 text-emerald-200">{done} done</Badge>}
          {blocked > 0 && <Badge className="bg-red-900 text-red-300">{blocked} blocked</Badge>}
        </div>
        <div className="flex items-center gap-2" onClick={e => e.stopPropagation()}>
          <button
            onClick={handleResetOrder}
            className="text-xs text-slate-400 hover:text-white px-2 py-1 border border-slate-600 rounded"

// ─── IMPORT / EXPORT CONTROLS ─────────────────────────────────────────────────

function ImportExportControls({ tasks, pathways, onImport, onReset }) {
  const [showResetConfirm, setShowResetConfirm] = useState(false);
  const [importError, setImportError] = useState("");
  const fileInputRef = useRef(null);

  function exportJSON() {
    const data = JSON.stringify({ tasks, pathways, exportedAt: new Date().toISOString() }, null, 2);
    const blob = new Blob([data], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `fl-move-${todayISO()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function exportCSV() {
    const headers = ["Title", "Owner", "Frequency", "Category", "Priority", "Status", "Due Date", "Rollover Count", "Notes"];
    const rows = tasks.map(t => [
      `"${(t.title || "").replace(/"/g, '""')}"`,
      t.owner,
      t.frequency,
      t.category,
      t.priority,
      t.status,
      t.dueDate || "",
      t.rolloverCount,
      `"${(t.notes || "").replace(/"/g, '""')}"`
    ]);
    const csv = [headers.join(","), ...rows.map(r => r.join(","))].join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `fl-move-${todayISO()}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function handleImport(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.tasks && Array.isArray(data.tasks)) {
          onImport(data);
          setImportError("");
        } else {
          setImportError("Invalid file format. Expected {tasks: [...]}");
        }
      } catch {
        setImportError("Could not parse JSON file.");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  return (
    <div className="flex flex-wrap items-center gap-2">
      <button onClick={exportJSON} className="bg-slate-700 hover:bg-slate-600 text-slate-200 text-xs px-3 py-1.5 rounded border border-slate-600">⬇ Export JSON</button>
      <button onClick={exportCSV} className="bg-slate-700 hover:bg-slate-600 text-slate-200 text-xs px-3 py-1.5 rounded border border-slate-600">⬇ Export CSV</button>
      <button onClick={() => fileInputRef.current?.click()} className="bg-slate-700 hover:bg-slate-600 text-slate-200 text-xs px-3 py-1.5 rounded border border-slate-600">⬆ Import JSON</button>
      <input ref={fileInputRef} type="file" accept=".json" onChange={handleImport} className="hidden" />
      {showResetConfirm ? (
        <div className="flex items-center gap-2">
          <span className="text-xs text-red-400">Reset all data to demo?</span>
          <button onClick={() => { onReset(); setShowResetConfirm(false); }} className="bg-red-600 hover:bg-red-500 text-white text-xs px-3 py-1.5 rounded">Yes, Reset</button>
          <button onClick={() => setShowResetConfirm(false)} className="bg-slate-600 text-white text-xs px-2 py-1.5 rounded">Cancel</button>
        </div>
      ) : (
        <button onClick={() => setShowResetConfirm(true)} className="text-red-400 hover:text-red-300 text-xs px-3 py-1.5 rounded border border-red-900 hover:border-red-700">↺ Reset to Demo Data</button>
      )}
      {importError && <span className="text-red-400 text-xs">{importError}</span>}
    </div>
  );
}

// ─── CLOUD SYNC ───────────────────────────────────────────────────────────────
// Saves to Cloudflare KV via /api/data so all devices stay in sync.
// localStorage is used only as a fast cache for instant load on return visits.
// A debounced save fires 1.5 seconds after the last change to avoid hammering the API.

const SYNC_DEBOUNCE_MS = 1500;

async function loadFromCloud() {
  try {
    const res = await fetch("/api/data", { credentials: "same-origin" });
    if (!res.ok) return null;
    return await res.json(); // null means no cloud data yet
  } catch {
    return null;
  }
}

async function saveToCloud(state) {
  try {
    await fetch("/api/data", {
      method: "POST",
      credentials: "same-origin",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(state),
    });
  } catch {
    // silent — localStorage cache still has the data
  }
}

      </div>

      {/* Filters */}
      <div className="flex gap-2 flex-wrap items-center">
        <div className="flex gap-1">
          {[["all","All"],["justin","Justin"],["anna","Anna"],["both","Both"]].map(([v,l]) => (
            <button key={v} onClick={() => setFilter(v)} className={`text-xs px-2.5 py-1 rounded-lg border transition-all ${filter === v ? "bg-teal-700 border-teal-600 text-white" : "border-slate-700 text-slate-400 hover:border-slate-500"}`}>{l}</button>
          ))}
        </div>
        <input
          type="text"
          value={search}
          onChange={e => setSearch(e.target.value)}
          placeholder="Search notes…"
          className="bg-slate-800 border border-slate-700 rounded-lg text-slate-200 text-xs px-3 py-1.5 outline-none focus:border-teal-500 placeholder-slate-500 flex-1 min-w-[160px]"
        />
        {(filter !== "all" || search) && (
          <button onClick={() => { setFilter("all"); setSearch(""); }} className="text-xs text-slate-400 hover:text-white">Clear</button>
        )}
      </div>

      {loading && <p className="text-slate-400 text-sm text-center py-8">Loading notes…</p>}

      {!loading && filteredPinned.length === 0 && filteredUnpinned.length === 0 && (
        <div className="text-center py-12">
          <p className="text-slate-500 text-sm">No notes yet.</p>
          <p className="text-slate-600 text-xs mt-1">Use this log to capture decisions, progress updates, blockers, and reminders for each other.</p>
        </div>
      )}

      {/* Pinned notes */}
      {!loading && filteredPinned.length > 0 && (
        <div className="space-y-3">
          <h3 className="text-xs font-semibold text-yellow-500 uppercase tracking-wide">Pinned</h3>
          {filteredPinned.map(n => <NoteCard key={n.id} note={n} />)}
        </div>
      )}

      {/* All other notes */}
      {!loading && filteredUnpinned.length > 0 && (
        <div className="space-y-3">
          {filteredPinned.length > 0 && <h3 className="text-xs font-semibold text-slate-500 uppercase tracking-wide">All Entries</h3>}
          {filteredUnpinned.map(n => <NoteCard key={n.id} note={n} />)}
        </div>
      )}
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────

function App() {
  // Boot from localStorage immediately so the UI is instant, then hydrate from cloud
  const [tasks, setTasks] = useState(() => {
    try {
      const saved = localStorage.getItem("flmove_tasks");
      if (saved) return JSON.parse(saved);
    } catch {}
    return generateSeedTasks();
  });

  const [pathways, setPathways] = useState(() => {
    try {
      const saved = localStorage.getItem("flmove_pathways");
      if (saved) return JSON.parse(saved);
    } catch {}
    return PATHWAYS;
  });

  const [activePathway, setActivePathway] = useState(() => {
    return localStorage.getItem("flmove_activePathway") || "keep-retro-sell-venetian";
  });

  const [editingPathwayId, setEditingPathwayId] = useState(null);
  const [showRolloverModal, setShowRolloverModal] = useState(false);
  const [activeTab, setActiveTab] = useState("dashboard"); // dashboard | tasks | notes
  const [notes, setNotes] = useState([]);
  const [notesLoading, setNotesLoading] = useState(false);

  // Load notes from cloud whenever the notes tab is opened
  useEffect(() => {
    if (activeTab !== "notes") return;
    setNotesLoading(true);
    fetch("/api/notes", { credentials: "same-origin" })
      .then(r => r.json())
      .then(data => { setNotes(Array.isArray(data) ? data : []); })
      .catch(() => {})
      .finally(() => setNotesLoading(false));
  }, [activeTab]);
  const [syncStatus, setSyncStatus] = useState("loading"); // loading | synced | saving | error

  // On mount: pull latest state from cloud (overrides localStorage cache)
  useEffect(() => {
    setSyncStatus("loading");
    loadFromCloud().then(cloudData => {
      if (cloudData && cloudData.tasks) {
        setTasks(cloudData.tasks);
        try { localStorage.setItem("flmove_tasks", JSON.stringify(cloudData.tasks)); } catch {}
      }
      if (cloudData && cloudData.pathways) {
        setPathways(cloudData.pathways);
        try { localStorage.setItem("flmove_pathways", JSON.stringify(cloudData.pathways)); } catch {}
      }
      if (cloudData && cloudData.activePathway) {
        setActivePathway(cloudData.activePathway);
        try { localStorage.setItem("flmove_activePathway", cloudData.activePathway); } catch {}
      }
      setSyncStatus("synced");
    });
  }, []);

  // Debounced cloud save — fires 1.5s after last change
  const saveTimerRef = useRef(null);

  // Mirror every state change to localStorage immediately (fast cache)
  // and schedule a debounced cloud save
  useEffect(() => {
    try { localStorage.setItem("flmove_tasks", JSON.stringify(tasks)); } catch {}
    scheduleSave();
  }, [tasks]);

  useEffect(() => {
    try { localStorage.setItem("flmove_pathways", JSON.stringify(pathways)); } catch {}
    scheduleSave();
  }, [pathways]);

  useEffect(() => {
    try { localStorage.setItem("flmove_activePathway", activePathway); } catch {}
    scheduleSave();
  }, [activePathway]);

  function scheduleSave() {
    if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
    setSyncStatus("saving");
    saveTimerRef.current = setTimeout(() => {
      const state = {
        tasks: JSON.parse(localStorage.getItem("flmove_tasks") || "[]"),
        pathways: JSON.parse(localStorage.getItem("flmove_pathways") || "[]"),
        activePathway: localStorage.getItem("flmove_activePathway") || "keep-retro-sell-venetian",
      };
      saveToCloud(state).then(() => setSyncStatus("synced")).catch(() => setSyncStatus("error"));
    }, SYNC_DEBOUNCE_MS);
  }

  // ROLLOVER LOGIC: Run on mount to catch overdue tasks
  useEffect(() => {
    setTasks(prev => runRolloverCheck(prev));
  }, []);

  // Midnight rollover check using interval
  useEffect(() => {
    const CHECK_INTERVAL = 60 * 1000; // check every minute
    let lastDate = todayISO();
    const interval = setInterval(() => {
      const currentDate = todayISO();
      if (currentDate !== lastDate) {
        lastDate = currentDate;
        setTasks(prev => runRolloverCheck(prev));
      }
    }, CHECK_INTERVAL);
    return () => clearInterval(interval);
  }, []);

  function handleUpdateTasks(updatedArr, isNew = false) {
    setTasks(prev => {
      if (isNew) {
        return [...prev, ...updatedArr];
      }
      const map = new Map(updatedArr.map(t => [t.id, t]));
      return prev.map(t => map.has(t.id) ? map.get(t.id) : t);
    });
  }

  function handleDeleteTask(id) {
    setTasks(prev => prev.filter(t => t.id !== id));
  }

  function handleAddTask(newTask) {
    setTasks(prev => [...prev, newTask]);
  }

  function handleBulkUpdate(updatedTasks) {
    handleUpdateTasks(updatedTasks);
  }

  function handleImport(data) {
    if (data.tasks) setTasks(data.tasks);
    if (data.pathways) setPathways(data.pathways);
  }

  function handleReset() {
    const freshTasks    = generateSeedTasks();
    const freshPathways = PATHWAYS;
    const freshPathway  = "keep-retro-sell-venetian";
    setTasks(freshTasks);
    setPathways(freshPathways);
    setActivePathway(freshPathway);
    // Also wipe the cloud store so all devices get the reset
    fetch("/api/data", { method: "DELETE", credentials: "same-origin" }).catch(() => {});
  }

  function handleEditPathway(id) {
    setEditingPathwayId(id);
  }

  function handleSavePathway(updated) {
    setPathways(prev => prev.map(p => p.id === updated.id ? updated : p));
  }

  const editingPathway = pathways.find(p => p.id === editingPathwayId);

  const rolledOverCount = tasks.filter(t => t.rolloverCount >= 3).length;

  return (
    <div className="min-h-screen bg-slate-900 text-slate-100">
      {/* ── TOP NAV ── */}
      <header className="bg-slate-950 border-b border-slate-800 sticky top-0 z-40">
        <div className="max-w-7xl mx-auto px-4 py-3">
          <div className="flex items-center justify-between gap-3 flex-wrap">
            <div className="flex items-center gap-3">
              <div>
                <h1 className="text-lg font-bold text-teal-400 leading-none">FL MOVE</h1>
                <p className="text-xs text-slate-500">Bunnell Family Transition Dashboard</p>
              </div>
              <div className="h-6 w-px bg-slate-700 hidden sm:block" />
              <div className="hidden sm:flex gap-1">
                <button
                  onClick={() => setActiveTab("dashboard")}
                  className={`text-sm px-3 py-1.5 rounded-lg font-medium transition-all ${activeTab === "dashboard" ? "bg-teal-700 text-white" : "text-slate-400 hover:text-white hover:bg-slate-800"}`}
                >Dashboard</button>
                <button
                  onClick={() => setActiveTab("tasks")}
                  className={`text-sm px-3 py-1.5 rounded-lg font-medium transition-all ${activeTab === "tasks" ? "bg-teal-700 text-white" : "text-slate-400 hover:text-white hover:bg-slate-800"}`}
                >All Tasks</button>
                <button
                  onClick={() => setActiveTab("notes")}
                  className={`text-sm px-3 py-1.5 rounded-lg font-medium transition-all ${activeTab === "notes" ? "bg-teal-700 text-white" : "text-slate-400 hover:text-white hover:bg-slate-800"}`}
                >📝 Notes &amp; Log</button>
              </div>
            </div>

            <div className="flex items-center gap-2">
              {rolledOverCount > 0 && (
                <button
                  onClick={() => setShowRolloverModal(true)}
                  className="text-xs bg-orange-900 hover:bg-orange-800 text-orange-200 px-2 py-1.5 rounded border border-orange-700"
                >
                  ⚠ {rolledOverCount} task{rolledOverCount !== 1 ? "s" : ""} rolled 3×+
                </button>
              )}
              <button
                onClick={() => setShowRolloverModal(true)}
                className="text-xs text-slate-400 hover:text-white px-2 py-1.5 rounded border border-slate-700 hover:border-slate-500"
              >↻ Rollover Log</button>
              {/* Cloud sync indicator */}
              <span className={`text-xs px-2 py-1 rounded border flex items-center gap-1 ${
                syncStatus === "synced"  ? "text-emerald-400 border-emerald-900 bg-emerald-950" :
                syncStatus === "saving"  ? "text-yellow-400 border-yellow-900 bg-yellow-950" :
                syncStatus === "loading" ? "text-slate-400 border-slate-700 bg-slate-900" :
                                           "text-red-400 border-red-900 bg-red-950"
              }`}>
                {syncStatus === "synced"  && "☁ Synced"}
                {syncStatus === "saving"  && "↑ Saving…"}
                {syncStatus === "loading" && "↓ Loading…"}
                {syncStatus === "error"   && "⚠ Sync error"}
              </span>
              <span className="text-xs text-slate-500">Today: {formatDate(todayISO())}</span>
            </div>
          </div>

          {/* Mobile tabs */}
          <div className="flex sm:hidden gap-1 mt-2">
            <button onClick={() => setActiveTab("dashboard")} className={`text-sm px-3 py-1.5 rounded-lg font-medium flex-1 ${activeTab === "dashboard" ? "bg-teal-700 text-white" : "text-slate-400 bg-slate-800"}`}>Dashboard</button>
            <button onClick={() => setActiveTab("tasks")} className={`text-sm px-3 py-1.5 rounded-lg font-medium flex-1 ${activeTab === "tasks" ? "bg-teal-700 text-white" : "text-slate-400 bg-slate-800"}`}>Tasks</button>
            <button onClick={() => setActiveTab("notes")} className={`text-sm px-3 py-1.5 rounded-lg font-medium flex-1 ${activeTab === "notes" ? "bg-teal-700 text-white" : "text-slate-400 bg-slate-800"}`}>📝 Log</button>
          </div>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-4 py-6">
        {/* ── PATHWAY SELECTOR ── */}
        <PathwaySelector
          pathways={pathways}
          active={activePathway}
          onChange={setActivePathway}
          onEditPathway={handleEditPathway}
        />

        {activeTab === "notes" ? (
          <NotesLog
            notes={notes}
            loading={notesLoading}
            onAdd={(note) => {
              fetch("/api/notes", {
                method: "POST",
                credentials: "same-origin",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(note),
              })
                .then(r => r.json())
                .then(saved => setNotes(prev => [saved, ...prev]))
                .catch(() => {});
            }}
            onDelete={(id) => {
              fetch(`/api/notes?id=${id}`, { method: "DELETE", credentials: "same-origin" })
                .then(() => setNotes(prev => prev.filter(n => n.id !== id)))
                .catch(() => {});
            }}
            onPin={(note) => {
              fetch("/api/notes", {
                method: "PATCH",
                credentials: "same-origin",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ id: note.id, pinned: !note.pinned }),
              })
                .then(r => r.json())
                .then(updated => setNotes(prev => prev.map(n => n.id === updated.id ? updated : n)))
                .catch(() => {});
            }}
          />
        ) : activeTab === "dashboard" ? (
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div className="lg:col-span-2">
              <DashboardSummary
                tasks={tasks}
                activePathway={activePathway}
                pathways={pathways}
              />
            </div>
            <div className="space-y-4">
              <ReadinessScoreWidget tasks={tasks} />
              <div className="bg-slate-800 border border-slate-700 rounded-xl p-4">
                <h3 className="text-sm font-bold text-slate-300 mb-3 uppercase tracking-wide">Data Tools</h3>
                <ImportExportControls
                  tasks={tasks}
                  pathways={pathways}
                  onImport={handleImport}
                  onReset={handleReset}
                />
              </div>
              <div className="bg-slate-800 border border-slate-700 rounded-xl p-4">
                <h3 className="text-sm font-bold text-slate-300 mb-2 uppercase tracking-wide">Task Summary</h3>
                <div className="space-y-1.5">
                  {STATUSES.map(s => {
                    const count = tasks.filter(t => t.status === s).length;
                    const pct = Math.round((count / Math.max(1, tasks.length)) * 100);
                    return (
                      <div key={s} className="flex items-center gap-2">
                        <StatusBadge status={s} />
                        <div className="flex-1 bg-slate-700 rounded-full h-1.5">
                          <div className="bg-teal-500 h-1.5 rounded-full" style={{ width: `${pct}%` }} />
                        </div>
                        <span className="text-xs text-slate-400 w-8 text-right">{count}</span>
                      </div>
                    );
                  })}
                  <p className="text-xs text-slate-500 mt-2">Total tasks: {tasks.length}</p>
                </div>
              </div>
            </div>
          </div>
        ) : (
          <div>
            {/* Task Board - Three frequency sections */}
            {["Daily", "Weekly", "Monthly"].map(freq => (
              <TaskSection
                key={freq}
                frequency={freq}
                tasks={tasks}
                activePathway={activePathway}
                onUpdate={handleUpdateTasks}
                onDelete={handleDeleteTask}
                onAdd={handleAddTask}
                onBulkUpdate={handleBulkUpdate}
              />
            ))}

            {/* One-time tasks section */}
            <TaskSection
              key="One-time"
              frequency="One-time"
              tasks={tasks}
              activePathway={activePathway}
              onUpdate={handleUpdateTasks}
              onDelete={handleDeleteTask}
              onAdd={handleAddTask}
              onBulkUpdate={handleBulkUpdate}
            />
          </div>
        ) /* end tasks tab */ }

        {/* ── FOOTER ── */}
        <footer className="mt-12 pt-6 border-t border-slate-800 text-center">
          <p className="text-slate-600 text-xs">
            FL MOVE — Bunnell Family Transition Dashboard &nbsp;·&nbsp;
            Justin &amp; Anna Bunnell &nbsp;·&nbsp;
            Data synced to Cloudflare &nbsp;·&nbsp;
            <span className="text-slate-700">Use Export JSON to back up your data</span>
          </p>
        </footer>
      </main>

      {/* ── MODALS ── */}
      {editingPathway && (
        <PathwayEditorModal
          pathway={editingPathway}
          onSave={handleSavePathway}
          onClose={() => setEditingPathwayId(null)}
        />
      )}
      {showRolloverModal && (
        <RolloverHistoryModal tasks={tasks} onClose={() => setShowRolloverModal(false)} />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
